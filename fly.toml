# Fly.io Backend Configuration
app = "loba-backend"
primary_region = "sjc"

[build]
  image = "dockerfile"
  dockerfile = "loba-backend/Dockerfile"

[env]
  PYTHONUNBUFFERED = "true"
  ENVIRONMENT = "production"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services.http_checks]]
  grace_period = "120s"
  interval = 30000
  method = "get"
  path = "/api/health"
  protocol = "http"
  timeout = 5000
  tls_skip_verify = false
